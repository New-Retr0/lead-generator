name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pallares_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/pallares_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Bootstrap CI Postgres
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/ci_postgres_bootstrap.sql

      - name: Apply migrations
        run: |
          for f in \
            supabase/migrations/20250616000100_core_schema.sql \
            supabase/migrations/20250616000200_sales_feedback_triggers.sql \
            supabase/migrations/20250616000300_sales_view.sql \
            supabase/migrations/20250616000400_rls_policies.sql \
            supabase/migrations/20250616000500_cost_aggregation_views.sql
          do
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run pytest
        run: pytest tests/ -q
