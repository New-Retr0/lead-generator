# Campaign matrix — which markets × categories to run together.
# Use: pallares-leads smoke-sample  (5 enriched leads per combo, default Reedley)
#      pallares-leads smoke-sample --all-markets
#      pallares-leads run-campaign --limit 20

_expansion_categories: &expansion_categories
  - gas_station
  - fast_food
  - strip_mall
  - outdoor_mall
  - shopping_center
  - coffee_drive_thru
  - grocery
  - medical_plaza
  - pharmacy
  - bank
  - industrial
  - big_box
  - auto_dealer
  - dollar_store
  - restaurant
  - parking
  - parking_small
  - parking_large_private
  - hotel
  - thrift_store
  - community_facility
  - amusement_facility
  - public_agency
  - hoa
  - property_manager

campaigns:
  central_valley:
    description: Central Valley commercial exterior cleaning targets
    markets:
      - reedley
      - dinuba
      - selma
      - kingsburg
      - sanger
      - fresno
      - visalia
    categories:
      - gas_station
      - fast_food
      - strip_mall
      - shopping_center
      - grocery
      - medical_plaza
      - pharmacy
      - bank
      - industrial
      - big_box
      - auto_dealer
      - dollar_store
      - restaurant
      - parking
      - parking_small
      - parking_large_private
      - hotel
      - thrift_store
      - community_facility
      - amusement_facility
      - public_agency
      - hoa
      - property_manager
    # property_manager searches Fresno County, not individual cities
    county_overrides:
      property_manager: fresno_county

  hawaii:
    description: Hawaii commercial exterior cleaning targets
    markets:
      - honolulu_hi
      - pearl_city_hi
      - hilo_hi
      - kailua_hi
    categories: *expansion_categories

  oregon:
