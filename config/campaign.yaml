      - bend_or
      - medford_or
      - springfield_or
      - corvallis_or
      - albany_or
      - tigard_or
    categories: *expansion_categories

  washington:
    description: Washington commercial exterior cleaning targets
    markets:
      - seattle_wa
      - spokane_wa
      - tacoma_wa
