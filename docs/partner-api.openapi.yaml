openapi: 3.1.0
info:
  title: Pallares Lead API
  version: v1
  description: |
    Cursor-sync Lead API for Pallares.us verified-lead ingestion and structured feedback.
    Auth keys remain `ppl_...` partner keys.

    **Primary auth:** `x-api-key: ppl_...`  
    **Also accepted:** `Authorization: Bearer ppl_...`

    List/detail serve **Verified** leads only (`verified_leads_v1`). A lead is eligible when:
    - a worked lead payload is present (`enrichment_status = enriched` + `enriched_json`)
    - `confidence` is not `Low`
    - `lead_score >= 25`
    - `is_verified_decision_maker(...)` is true — `verification_level = verified`
      plus a grounded, non-placeholder name + decision-maker role + local non-toll-free phone

    Unverified / phone-only leads are **not** API-eligible (operators can still try them
    in the dashboard). `primary_phone` is a locally callable `best_contact_phone` only
    (placeholders such as `Not found` are null; never coalesced from Google `main_phone`).
    Path `place_id` values may contain slashes (e.g. `places/ChIJ...`); URL-encode them
    (`places%2FChIJ...`) or pass the unencoded multi-segment path — both are accepted.

    **Idempotency:** POST `/leads/{place_id}/outcome`, `/leads/{place_id}/touches`, and
    `/feedback/batch` accept an optional `Idempotency-Key` header. Successful responses
    are stored per API key and returned on replay.

    ## Roadmap

    `POST /orders` and `POST /webhooks` are OpenAPI stubs only (`x-stability: experimental`).
    They are not implemented in v1.
servers:
  - url: https://aufbppdxjybopacabsbk.supabase.co/functions/v1/partner-api/v1
    description: Production Edge Function
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  api_version:
                    type: string
                  generated_at:
                    type: string
                    format: date-time
  /metadata:
    get:
      summary: Sync metadata
      responses:
        "200":
          description: Categories, markets, and cursor rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /usage:
    get:
      summary: Per-key usage and remaining budget (requires leads:read)
      responses:
        "200":
          description: Rate and daily row usage for the calling key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /leads:
    get:
      summary: List leads (cursor sync)
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [client, vendor, all]
            default: client
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque cursor from a previous page
        - in: query
          name: updated_since
          schema:
            type: string
            format: date-time
          description: Backfill filter when cursor is omitted
      responses:
        "200":
          description: Lead page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /leads/{place_id}:
    get:
      summary: Lead detail
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Eligible lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /leads/{place_id}/eligibility:
    get:
      summary: Eligibility debug for a place_id (requires leads:read)
      description: |
        Explains why a lead is or is not present in `verified_leads_v1`.
        Does not reintroduce unverified/mainline eligibility into list/detail.
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Gate breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /leads/{place_id}/outcome:
    get:
      summary: Read this key's structured outcome (requires leads:feedback)
      description: Returns only the outcome posted by the calling partner API key.
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Current outcome for this key
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      summary: Upsert this key's structured outcome (requires leads:feedback)
      description: |
        Writes to `partner_lead_outcomes` scoped by `(place_id, partner_key_id)`.
        Does not overwrite other partners. Learning aggregation still collapses
        partner + CRM outcomes in `lead_labels`.
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadOutcomeInput"
      responses:
        "200":
          description: Outcome saved
  /leads/{place_id}/touches:
    get:
      summary: List touches posted by this API key (requires leads:feedback)
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Touch list
    post:
      summary: Log a touch (requires leads:feedback)
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadTouchInput"
      responses:
        "200":
          description: Touch saved
  /feedback/batch:
    post:
      summary: Batch outcome/touch sync (requires leads:feedback, max 100)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              maxItems: 100
              items:
                type: object
      responses:
        "200":
          description: Batch results
  /orders:
    post:
      summary: Lead request orders (roadmap stub)
      description: |
        Not implemented in v1. Reserved for future partner lead-request ordering.
        See Roadmap section — x-stability: experimental.
      x-stability: experimental
      responses:
        "501":
          description: Not implemented
  /webhooks:
    post:
      summary: Webhook registration (roadmap stub)
      description: |
        Not implemented in v1. Reserved for future new-lead push webhooks.
        See Roadmap section — x-stability: experimental.
      x-stability: experimental
      responses:
        "501":
          description: Not implemented
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Preferred partner authentication header (`ppl_...`)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ppl_
      description: Compatibility alternative to x-api-key
  parameters:
    PlaceId:
      in: path
      name: place_id
      required: true
      schema:
        type: string
      description: |
        Lead place id. May contain slashes (Google Places resource name). Prefer
        URL-encoding (`encodeURIComponent`) when building clients.
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
      description: |
        Optional. On successful POST outcome/touches/batch, the response is stored
        per partner key and returned unchanged on replay with the same key.
  schemas:
    ApiError:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    MetadataResponse:
      type: object
      properties:
        api_version:
          type: string
        schema_version:
          type: string
        lead_types:
          type: array
          items:
            type: string
        max_limit:
          type: integer
        categories:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
                nullable: true
        markets:
          type: array
          items:
            type: string
        cursor:
          type: object
          description: Cursor pagination rules for GET /leads
          properties:
            sort:
              type: array
              items:
                type: string
            mode:
              type: string
              enum: [forward-only]
    UsageResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            partner_name:
              type: string
            scopes:
              type: array
              items:
                type: string
            rate_limit_per_minute:
              type: integer
            requests_last_minute:
              type: integer
            requests_remaining_minute:
              type: integer
            daily_row_limit:
              type: integer
            rows_today:
              type: integer
            rows_remaining_today:
              type: integer
        meta:
          type: object
    EligibilityResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            place_id:
              type: string
            eligible:
              type: boolean
            is_verified:
              type: boolean
            status:
              type: string
              enum: [verified, unverified]
            gates:
              type: object
              properties:
                has_lead_payload:
                  type: boolean
                confidence_ok:
                  type: boolean
                score_ok:
                  type: boolean
                verified_decision_maker:
                  type: boolean
            failures:
              type: array
              items:
                type: string
            notes:
              type: array
              items:
                type: string
        meta:
          type: object
    LeadListItem:
      type: object
      properties:
        lead_id:
          type: string
        place_id:
          type: string
        lead_type:
          type: string
          enum: [client, vendor]
        business_name:
          type: string
        category_key:
          type: string
          nullable: true
        market_key:
          type: string
          nullable: true
        primary_phone:
          type: string
          nullable: true
          description: >
            Atomic DM phone (`best_contact_phone` only when locally callable).
            Placeholder sentinels such as `Not found` are null. Never coalesced
            from Google `main_phone`.
        status:
          type: string
          enum: [verified]
          description: API list/detail only returns Verified leads
        verification_level:
          type: string
          enum: [verified]
          description: Verified leads only (unverified / phone-only excluded)
        last_worked_at:
          type: string
          format: date-time
          nullable: true
          description: When the lead was last worked (pipeline pass)
        updated_at:
          type: string
          format: date-time
    LeadsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LeadListItem"
        page:
          type: object
          properties:
            limit:
              type: integer
            next_cursor:
              type: string
              nullable: true
            has_more:
              type: boolean
        meta:
          type: object
    LeadDetailResponse:
      type: object
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/LeadListItem"
            - type: object
              properties:
                site_contacts:
                  type: array
                  items:
                    type: object
                evidence_urls:
                  type: array
                  items:
                    type: string
                fact_summaries:
                  type: object
                score_breakdown:
                  type: object
                coordinates:
                  type: object
                  properties:
                    latitude:
                      type: number
                      nullable: true
                    longitude:
                      type: number
                      nullable: true
        meta:
          type: object
    LeadOutcomeInput:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [won, lost, bad_data, unqualified, no_response]
        outcome_reason:
          type: string
          enum:
            - wrong_number
            - no_answer_ever
            - gatekeeper_block
            - not_decision_maker
            - no_budget
            - competitor
            - timing
            - price
            - invalid_business
            - duplicate
            - other
        deal_value_usd:
          type: number
        quality_rating:
          type: integer
          minimum: 1
          maximum: 5
        data_flags:
          type: object
        notes:
          type: string
        decided_at:
          type: string
          format: date-time
    LeadTouchInput:
      type: object
      required: [touch_type]
      properties:
        touch_type:
          type: string
          enum: [call, email, sms, visit, other]
        result:
          type: string
          enum:
            - answered
            - voicemail
            - no_answer
            - wrong_number
            - disconnected
            - gatekeeper
            - dm_reached
            - email_sent
            - email_bounced
            - email_replied
            - other
        contact_name:
          type: string
        contact_phone:
          type: string
        duration_seconds:
          type: integer
        notes:
          type: string
        occurred_at:
          type: string
          format: date-time
        meta:
          type: object
  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    BadRequest:
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Lead not found or not eligible
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    RateLimited:
      description: Rate or daily row budget exceeded
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
security:
  - apiKeyAuth: []
  - bearerAuth: []
