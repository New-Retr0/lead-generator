    property_type: public_agency
    queries:
      - city public works department
      - parks and recreation department
      - municipal facilities maintenance
    enrichment:
      min_contact_bar: phone

  hoa:
    label: HOA / Homeowners Association Office
    property_type: hoa
    queries:
      - homeowners association office
      - HOA management office

  property_manager:
    label: Commercial Property Manager
    property_type: property_manager
    # No reliable Table A type — text search only (run at county level via campaign.yaml)
    queries:
      - commercial property management
      - property management company
      - commercial real estate management
    enrichment:
      min_contact_bar: labeled_phone
      always_investigate: true
      registry_lookup:
        - bbb
        - state_license
        - linkedin_serp

  vendor_pressure_washing:
    label: "Vendor: Pressure Washing"
    property_type: vendor_pressure_washing
    # No reliable Places Table A type — text search only.
    queries:
      - commercial pressure washing company
      - pressure washing service
      - power washing company
    enrichment:
      min_contact_bar: phone
      always_investigate: true
      allow_owner_chain: false
      registry_lookup: bbb
      insurance_keywords:
        - fully insured
        - licensed and insured
        - bonded and insured
        - general liability
        - insured
